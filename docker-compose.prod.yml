services:
  mlflow:
    ports:
      - "5000:5000"
    command:
      - bash
      - -c
      - |
        pip install psycopg2-binary boto3 -q
        exec mlflow server \
          --backend-store-uri "postgresql+psycopg2://$$POSTGRES_USER:$$POSTGRES_PASSWORD@postgres:5432/$$POSTGRES_DB" \
          --artifacts-destination "s3://$$MLFLOW_S3_BUCKET/mlflow" \
          --default-artifact-root "mlflow-artifacts:/" \
          --serve-artifacts \
          --host 0.0.0.0 \
          --port 5000 \
          --disable-security-middleware
    environment:
      MLFLOW_S3_BUCKET: ${MLFLOW_S3_BUCKET}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-ap-southeast-1}

  fastapi:
    image: ${FASTAPI_IMAGE:-modelserve-app:latest}
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
