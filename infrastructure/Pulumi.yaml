name: modelserve
runtime:
  name: python
  options:
    virtualenv: venv
description: ModelServe AWS infrastructure — VPC, EC2, S3, ECR
config:
  ssh_cidr:
    default: "0.0.0.0/0"
    description: CIDR block allowed for SSH access (restrict to your IP in production)
  github_repo:
    default: ""
    description: HTTPS URL of the GitHub repo to clone on EC2 boot (e.g. https://github.com/user/repo)
