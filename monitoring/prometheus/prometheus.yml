global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: fastapi
    scrape_interval: 10s
    static_configs:
      - targets: ["fastapi:8000"]
    metrics_path: /metrics
