groups:
  - name: modelserve
    rules:
      - alert: HighPredictionLatency
        expr: histogram_quantile(0.95, rate(prediction_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High prediction latency (p95 > 500ms)"
          description: "p95 latency is {{ $value | humanizeDuration }} — threshold is 500ms."

      - alert: HighErrorRate
        expr: rate(prediction_errors_total[2m]) / (rate(prediction_requests_total[2m]) + 0.001) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High prediction error rate (> 5%)"
          description: "Error rate is {{ $value | humanizePercentage }}."

      - alert: FastAPIDown
        expr: up{job="fastapi"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "FastAPI service is unreachable"
          description: "Prometheus cannot scrape the FastAPI /metrics endpoint."
