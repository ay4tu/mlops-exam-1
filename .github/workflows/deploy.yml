name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-southeast-1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest app/tests/ -v

  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login
      - name: Build and push
        run: |
          ECR_URL="${{ steps.ecr-login.outputs.registry }}/modelserve-app"
          docker build --platform linux/amd64 \
            -t "$ECR_URL:latest" \
            -t "$ECR_URL:${{ github.sha }}" .
          docker push "$ECR_URL:latest"
          docker push "$ECR_URL:${{ github.sha }}"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Get EC2 IP
        id: ip
        run: |
          IP=$(aws ec2 describe-addresses \
            --filters "Name=tag:Name,Values=modelserve-eip" \
            --query "Addresses[0].PublicIp" \
            --output text)
          echo "ip=$IP" >> $GITHUB_OUTPUT
      - name: Pull and restart FastAPI
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/key
          chmod 600 /tmp/key
          IP="${{ steps.ip.outputs.ip }}"
          ssh -i /tmp/key -o StrictHostKeyChecking=no ec2-user@$IP \
            "cd /home/ec2-user/app && \
             ECR_HOST=\$(grep FASTAPI_IMAGE .env | cut -d= -f2 | cut -d/ -f1) && \
             aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
               docker login --username AWS --password-stdin \"\$ECR_HOST\" && \
             docker-compose -f docker-compose.yml -f docker-compose.prod.yml pull fastapi && \
             docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d fastapi"
      - name: Verify health
        run: |
          IP="${{ steps.ip.outputs.ip }}"
          for i in $(seq 1 12); do
            curl -sf "http://$IP:8000/health" && exit 0
            sleep 5
          done
          echo "Health check failed after 60s"
          exit 1
